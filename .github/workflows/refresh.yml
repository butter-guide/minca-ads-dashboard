name: Rafraîchir le dashboard Minca Ads

on:
  schedule:
    - cron: "*/30 * * * *"   # toutes les 30 minutes
  workflow_dispatch:          # lancement manuel possible

permissions:
  contents: read
  pages: write
  id-token: write

# évite les déploiements Pages concurrents
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installer les dépendances
        run: pip install -r requirements.txt

      - name: Mettre à jour le Sheet + générer le site chiffré
        env:
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          META_AD_ACCOUNT_ID: ${{ secrets.META_AD_ACCOUNT_ID }}
          META_DATE_PRESET: ${{ secrets.META_DATE_PRESET }}
          SHOPIFY_STORE: ${{ secrets.SHOPIFY_STORE }}
          SHOPIFY_CLIENT_ID: ${{ secrets.SHOPIFY_CLIENT_ID }}
          SHOPIFY_CLIENT_SECRET: ${{ secrets.SHOPIFY_CLIENT_SECRET }}
          SHEETS_WEBAPP_URL: ${{ secrets.SHEETS_WEBAPP_URL }}
          SHEETS_SECRET: ${{ secrets.SHEETS_SECRET }}
          SITE_PASSWORD: ${{ secrets.SITE_PASSWORD }}
          CURRENCY: ${{ secrets.CURRENCY }}
        run: python main.py

      - name: Préparer l'artefact Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Déployer sur GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
